<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my mandarin flashcards</title>
    <link rel="apple-touch-icon" href="d71184d9-2002-420e-b4ba-5c1d7ec6dfe0.jpg">
    <link rel="icon" type="image/png" sizes="192x192" href="d71184d9-2002-420e-b4ba-5c1d7ec6dfe0.jpg">
    <link rel="icon" type="image/png" sizes="512x512" href="d71184d9-2002-420e-b4ba-5c1d7ec6dfe0.jpg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <div class="nav-wrapper-right">
        <button id="add-panel-toggle" class="floating-icon-btn">
            <i class="fa-solid fa-square-plus"></i>
        </button>
        <div id="add-word-square" class="compact-square shadow-pop">
            <h3>+ ADD TO DECK</h3>
            <input type="text" id="user-hanzi" placeholder="Enter Hanzi">
            <input type="text" id="user-pinyin" placeholder="Enter Pinyin">
            <input type="text" id="user-meaning" placeholder="Enter Meaning">
            <button id="add-btn">ADD WORD</button>
        </div>
    </div>

    <div class="nav-wrapper-left">
        <button id="list-panel-toggle" class="floating-icon-btn">
            <i class="fa-solid fa-book-open"></i>
        </button>
        <div id="word-list-drawer" class="side-drawer-left shadow-pop">
            <h2>My Word Bank</h2>
            
            <input type="text" id="word-search" placeholder="🔍 Search Hanzi, Pinyin, or meaning..." style="width: 90%; padding: 8px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 0.85rem;">
            
            <ul id="word-list"></ul>
        </div>
    </div>

    <h1>Mandarin Flashcard Tracker woohoo</h1>
    
    <div id="welcome-menu">
        <h2>准备好了吗？我们开始吧！( •̀ ω •́ )✧</h2>
        <div class="menu-buttons">
            <button id="continue-btn">Continue session</button>
            <button id="reset-btn">Fresh Start~</button>
        </div>
    </div>

    <div class="card-container" id="flashcard-container">
        <div class="card" id="card-inner">
            <div class="card-face card-front">
                <p id="card-hanzi">---</p>
                <span class="tap-hint">Click Card or Flip Button to see</span>
            </div>
            <div class="card-face card-back">
                <p id="card-pinyin" class="pinyin">---</p>
                <p id="card-meaning" class="meaning">---</p>
            </div>
        </div>
    </div>

    <div class="buttons-container">
        <button id="next-btn">NEXT</button>
        <button id="flip-btn">FLIP</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
